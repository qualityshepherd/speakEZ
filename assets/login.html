<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>speakEZ — login</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1e1e1e">
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="speakEZ">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .card { width: 100%; max-width: 560px; }
    h1 { font-size: var(--text-xl); font-weight: 600; color: var(--accent); margin-bottom: 0.5rem; }
    .sub { color: var(--muted); font-size: var(--text-sm); margin-bottom: 1.75rem; line-height: 1.5; }
    .msg { font-size: var(--text-sm); margin-top: 1rem; min-height: 1.2rem; text-align: center; }
    .lost { text-align: center; margin-top: 1.5rem; font-size: var(--text-sm); color: var(--muted); }
    .lost a { color: var(--accent); }
    .phrase-wrap { position: relative; margin-bottom: 1rem; }
    .phrase-wrap input { margin-bottom: 0; padding-right: 2.5rem; }
    .eye { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; padding: 0; line-height: 1; display: flex; }
    .eye:hover { color: var(--accent); background: none; }
  </style>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>
  <main>
  <div class="card">
    <h1>welcome back</h1>
    <p class="sub">your passphrase is never sent or stored — it's used locally to derive your keys.</p>
    <label for="phrase">passphrase</label>
    <div class="phrase-wrap">
      <input type="password" id="phrase" autocomplete="current-password" placeholder="your passphrase">
      <button class="eye" id="eye" type="button" aria-label="Show/hide passphrase"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg></button>
    </div>
    <button id="btn">enter</button>
    <div class="msg" id="msg"></div>
    <div class="lost">lost your phrase? <a href="mailto:ack@brine.dev">hit me up</a></div>
  </div>
  </main>

  <script type="module">
    import { deriveKeypair, signChallenge } from '/lib/keys.js'

    const phraseEl = document.getElementById('phrase')
    const btn = document.getElementById('btn')
    const msg = document.getElementById('msg')
    const eye = document.getElementById('eye')

    eye.addEventListener('click', () => {
      phraseEl.type = phraseEl.type === 'password' ? 'text' : 'password'
    })

    const setMsg = (text, type = 'muted') => {
      msg.className = `msg ${type}`
      msg.textContent = text
    }

    btn.addEventListener('click', async () => {
      const phrase = phraseEl.value.trim()
      if (!phrase) return
      btn.disabled = true
      setMsg('deriving keys...')
      try {
        const { privateKey, pubkey } = await deriveKeypair(phrase, location.hostname)
        setMsg('signing in...')
        const challengeRes = await fetch('/api/challenge')
        const { challenge } = await challengeRes.json()
        const sig = await signChallenge(challenge, privateKey)
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pubkey, challenge, sig })
        })
        if (res.status === 401 || res.status === 404) {
          setMsg("that's not it.", 'danger')
          phraseEl.value = ''
          phraseEl.focus()
          btn.disabled = false
          return
        }
        if (!res.ok) {
          setMsg('something went wrong. try again.', 'danger')
          btn.disabled = false
          return
        }
        const { token, expires } = await res.json()
        localStorage.setItem('session', JSON.stringify({ token, expires, pubkey }))
        location.href = '/'
      } catch {
        setMsg('something went wrong. try again.', 'danger')
        btn.disabled = false
      }
    })

    phraseEl.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click() })
    phraseEl.focus()
  </script>
</body>
</html>
