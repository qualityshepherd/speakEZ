<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>speakEZ — you're invited</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1e1e1e">
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="speakEZ">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .card { width: 100%; max-width: 560px; position: relative; }
    h1 { font-size: var(--text-xl); font-weight: 600; color: var(--accent); margin-bottom: 0.5rem; }
    .sub { color: var(--muted); font-size: var(--text-sm); margin-bottom: 1.75rem; line-height: 1.5; }
    .meter { height: 3px; background: var(--border); border-radius: 2px; margin-top: -0.75rem; margin-bottom: 0.4rem; overflow: hidden; }
    .meter-bar { height: 100%; width: 0%; border-radius: 2px; transition: width 0.2s, background 0.2s; }
    .flavor { font-size: var(--text-sm); color: var(--muted); margin-bottom: 1rem; min-height: 1.1rem; }
    .msg { font-size: var(--text-sm); margin-top: 1rem; min-height: 1.2rem; text-align: center; }
    .dead { text-align: center; color: var(--muted); line-height: 1.6; }
    .phrase-wrap { position: relative; margin-bottom: 1rem; }
    .phrase-wrap input { margin-bottom: 0; padding-right: 2.5rem; }
    .eye { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; padding: 0; line-height: 1; display: flex; }
    .eye:hover { color: var(--accent); background: none; }
    button.submit { margin-top: 0.5rem; width: 100%; }

    /* profile step — layered inside the card */
    .card-inner { transition: filter 0.25s; }
    .card-inner.blurred { filter: blur(3px); pointer-events: none; user-select: none; }

    .profile-layer {
      position: absolute; inset: 0;
      background: rgba(30,30,30,0.72);
      backdrop-filter: blur(2px);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .profile-layer.visible { opacity: 1; pointer-events: auto; }

    .profile-box { width: 100%; }
    .profile-box h2 { font-size: var(--text-lg); font-weight: 600; color: var(--accent); margin-bottom: 0.35rem; }
    .profile-box .sub { margin-bottom: 1.25rem; }

    .avatar-preview-wrap { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .avatar-preview {
      width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; color: var(--muted); overflow: hidden;
      cursor: pointer; position: relative;
    }
    .avatar-preview img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .avatar-preview:hover .av-hint, .avatar-preview.drag-over .av-hint { opacity: 1; }
    .av-hint {
      position: absolute; inset: 0; border-radius: 50%;
      background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center;
      font-size: 0.55rem; color: #fff; text-align: center; line-height: 1.3;
      opacity: 0; transition: opacity 0.15s; pointer-events: none;
    }
    .avatar-preview.drag-over { outline: 2px solid var(--accent); outline-offset: 2px; }

    .profile-actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
    .profile-actions button { flex: 1; }
    .profile-msg { font-size: var(--text-sm); margin-top: 0.75rem; min-height: 1.2rem; text-align: center; }
  </style>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>
  <main>
  <h1 class="sr-only">speakEZ — you're invited</h1>
  <div class="card" id="card">
    <div class="card-inner" id="card-inner">
      <div class="dead">checking...</div>
    </div>
    <div class="profile-layer" id="profile-layer" role="region" aria-label="Set up your profile">
      <div class="profile-box">
        <h2>almost there</h2>
        <p class="sub">pick a name so people know who you are. avatar is optional.</p>
        <div class="avatar-preview-wrap">
          <div class="avatar-preview" id="av-preview" title="Click or drop an image to upload" role="button" aria-label="Upload avatar image">
            <img id="av-img" alt="">
            <span id="av-initial">?</span>
            <div class="av-hint" aria-hidden="true">drop or<br>click</div>
            <input type="file" id="av-file-input" accept="image/*" style="display:none" aria-hidden="true">
          </div>
          <div style="flex:1">
            <label for="profile-avatar">avatar url <span class="muted" style="font-size:var(--text-sm)">(optional)</span></label>
            <input type="url" id="profile-avatar" placeholder="https://..." autocomplete="off">
          </div>
        </div>
        <div class="field">
          <label for="profile-name">name</label>
          <input type="text" id="profile-name" autocomplete="off" placeholder="what do we call you?">
        </div>
        <div class="profile-actions">
          <button id="profile-save" disabled>let's go</button>
        </div>
        <div class="profile-msg" id="profile-msg" role="status" aria-live="polite"></div>
      </div>
    </div>
  </div>
  </main>

  <script type="module">
    import { deriveKeypair } from '/lib/keys.js'

    const cardInner = document.getElementById('card-inner')
    const profileLayer = document.getElementById('profile-layer')
    const token = new URLSearchParams(location.search).get('code') || location.pathname.split('/invite/')[1]
    const scoreColors = ['#c06060', '#b08040', '#b08040', '#6a9a6a', '#6a9a6a']

    const eyeIcon = `<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>`

    const scorePassphrase = (phrase) => {
      const len = phrase.length
      const words = phrase.trim().split(/\s+/).length
      const hasUpper = /[A-Z]/.test(phrase)
      const hasNum = /[0-9]/.test(phrase)
      const hasSymbol = /[^a-zA-Z0-9\s]/.test(phrase)
      let score = 0
      if (len >= 12) score++
      if (len >= 20) score++
      if (words >= 4) score++
      if (hasUpper || hasNum || hasSymbol) score++
      return {
        score: Math.min(score, 4),
        flavor: [
          'your dog could guess this',
          'a bored 12-year-old could crack this',
          'mediocre. try a movie quote',
          'not bad. a determined nerd might get there',
          'heat death of the universe. nice.'
        ][Math.min(score, 4)]
      }
    }

    const showDead = (msg, extra = '') => {
      cardInner.innerHTML = `
        <div class="dead">
          <p>${msg}</p>
          ${extra ? `<p style="margin-top:0.75rem;font-size:var(--text-sm)">${extra}</p>` : ''}
        </div>`
    }

    const showProfileStep = (sessionToken) => {
      cardInner.classList.add('blurred')
      profileLayer.classList.add('visible')

      const nameEl = document.getElementById('profile-name')
      const avatarEl = document.getElementById('profile-avatar')
      const avImg = document.getElementById('av-img')
      const avInitial = document.getElementById('av-initial')
      const saveBtn = document.getElementById('profile-save')

      const profileMsg = document.getElementById('profile-msg')

      const updatePreview = () => {
        const url = avatarEl.value.trim()
        const name = nameEl.value.trim()
        avInitial.textContent = name ? name[0].toUpperCase() : '?'
        saveBtn.disabled = !name
        if (url) {
          avImg.src = url
          avImg.style.display = 'block'
          avInitial.style.display = 'none'
          avImg.onerror = () => { avImg.style.display = 'none'; avInitial.style.display = '' }
        } else {
          avImg.style.display = 'none'
          avInitial.style.display = ''
        }
      }

      nameEl.addEventListener('input', updatePreview)
      avatarEl.addEventListener('input', updatePreview)

      const avPreview = document.getElementById('av-preview')
      const avFileInput = document.getElementById('av-file-input')

      const uploadAvatar = async (file) => {
        if (!file || !file.type.startsWith('image/')) return
        profileMsg.className = 'profile-msg muted'
        profileMsg.textContent = 'uploading...'
        try {
          const res = await fetch('/api/upload', {
            method: 'POST',
            headers: { Authorization: `Bearer ${sessionToken}`, 'Content-Type': file.type },
            body: file
          })
          if (!res.ok) { profileMsg.textContent = 'upload failed.'; profileMsg.className = 'profile-msg danger'; return }
          const { url } = await res.json()
          avatarEl.value = url
          updatePreview()
          profileMsg.textContent = ''
        } catch { profileMsg.textContent = 'upload failed.'; profileMsg.className = 'profile-msg danger' }
      }

      avPreview.addEventListener('click', () => avFileInput.click())
      avFileInput.addEventListener('change', () => {
        const file = avFileInput.files?.[0]
        avFileInput.value = ''
        if (file) uploadAvatar(file)
      })
      avPreview.addEventListener('dragover', e => { e.preventDefault(); avPreview.classList.add('drag-over') })
      avPreview.addEventListener('dragleave', e => { if (!avPreview.contains(e.relatedTarget)) avPreview.classList.remove('drag-over') })
      avPreview.addEventListener('drop', e => {
        e.preventDefault()
        avPreview.classList.remove('drag-over')
        const file = e.dataTransfer.files?.[0]
        if (file) uploadAvatar(file)
      })

      const finish = (name, avatar) => {
        if (name) localStorage.setItem('name', name)
        if (avatar) localStorage.setItem('avatar', avatar)
        location.href = '/'
      }

      const saveProfile = async () => {
        const name = nameEl.value.trim()
        const avatar = avatarEl.value.trim()
        if (!name) return
        saveBtn.disabled = true
        profileMsg.className = 'profile-msg muted'
        profileMsg.textContent = 'saving...'
        try {
          const res = await fetch('/api/me', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${sessionToken}` },
            body: JSON.stringify({ name, avatar: avatar || null })
          })
          if (!res.ok) { profileMsg.className = 'profile-msg danger'; profileMsg.textContent = 'something went wrong.'; saveBtn.disabled = false; return }
          finish(name, avatar)
        } catch {
          profileMsg.className = 'profile-msg danger'
          profileMsg.textContent = 'something went wrong.'
          saveBtn.disabled = false
        }
      }

      saveBtn.addEventListener('click', saveProfile)

      nameEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !saveBtn.disabled) saveProfile() })

      nameEl.focus()
    }

    const showForm = () => {
      cardInner.innerHTML = `
        <h1>you're invited</h1>
        <p class="sub">Enter a passphrase that you can always remember. It will never be stored anywhere — if you forget it, we can't recover it. A movie quote or personal saying is perfect.</p>
        <label for="phrase">passphrase</label>
        <div class="phrase-wrap">
          <input type="password" id="phrase" autocomplete="new-password" placeholder="something only you'd remember">
          <button class="eye" id="eye" type="button" aria-label="Show/hide passphrase">${eyeIcon}</button>
        </div>
        <div class="meter"><div class="meter-bar" id="bar"></div></div>
        <div class="flavor" id="flavor"></div>
        <button class="submit" id="btn" disabled>join</button>
        <div class="msg" id="msg"></div>`

      const phraseEl = document.getElementById('phrase')
      const bar = document.getElementById('bar')
      const flavor = document.getElementById('flavor')
      const btn = document.getElementById('btn')
      const msg = document.getElementById('msg')
      const eye = document.getElementById('eye')

      eye.addEventListener('click', () => {
        phraseEl.type = phraseEl.type === 'password' ? 'text' : 'password'
      })

      phraseEl.addEventListener('input', () => {
        const val = phraseEl.value
        if (!val) { bar.style.width = '0%'; flavor.textContent = ''; btn.disabled = true; return }
        const { score, flavor: f } = scorePassphrase(val)
        bar.style.width = `${(score + 1) * 20}%`
        bar.style.background = scoreColors[score]
        flavor.textContent = f
        btn.disabled = score < 2
      })

      btn.addEventListener('click', async () => {
        const phrase = phraseEl.value.trim()
        if (!phrase) return
        btn.disabled = true
        msg.className = 'msg muted'
        msg.textContent = 'deriving keys...'
        try {
          const { pubkey } = await deriveKeypair(phrase, location.hostname)
          msg.textContent = 'registering...'
          const res = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: token, pubkey })
          })
          if (res.status === 409) {
            msg.className = 'msg danger'
            msg.textContent = 'already registered with this passphrase.'
            btn.disabled = false
            return
          }
          if (!res.ok) {
            msg.className = 'msg danger'
            msg.textContent = 'something went wrong. try again.'
            btn.disabled = false
            return
          }
          const { token: sessionToken, expires } = await res.json()
          localStorage.setItem('session', JSON.stringify({ token: sessionToken, expires, pubkey }))
          showProfileStep(sessionToken)
        } catch {
          msg.className = 'msg danger'
          msg.textContent = 'something went wrong. try again.'
          btn.disabled = false
        }
      })

      phraseEl.focus()
    }

    if (!token) {
      showDead('you need an invite to get in.', 'if you know someone here, ask them.')
    } else {
      fetch(`/api/invite/validate/${token}`)
        .then(res => {
          if (res.status === 410) return showDead('this invite has expired or already been used.', 'hit up your contact for a new one.')
          if (!res.ok) return showDead("this invite isn't valid.", 'if you think this is wrong, hit up your contact.')
          showForm()
        })
        .catch(() => showDead('something went wrong.', 'try refreshing.'))
    }
  </script>
</body>
</html>
