<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>speakEZ</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1e1e1e">
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="speakEZ">
  <script>if (!JSON.parse(localStorage.getItem('session') || 'null')) document.documentElement.classList.add('no-session')</script>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="icon" href="/favicon.png" type="image/png">
</head>
<body>

  <header>
    <div style="display:flex;align-items:center;gap:0.6rem">
      <button class="hamburger" id="hamburger" aria-label="Open sidebar">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>
      <div style="position:relative">
        <h1 style="margin:0;font-size:inherit;font-weight:inherit;line-height:1"><button class="logo-btn" id="logo-btn" aria-haspopup="true" aria-expanded="false">speakEZ</button></h1>
        <div class="logo-menu" id="logo-menu" style="display:none" role="menu">
          <button class="logo-menu-item" id="logo-menu-rename" role="menuitem">rename</button>
          <button class="logo-menu-item" id="logo-menu-invite" role="menuitem">invite</button>
        </div>
      </div>
    </div>
    <div class="header-right">
      <img class="avatar-sm" id="avatar-img-sm" alt="avatar">
      <div class="avatar-placeholder-sm" id="avatar-placeholder-sm"></div>
      <button class="me-btn" id="me-btn">me</button>
    </div>
  </header>

  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

  <main class="main">
    <nav class="sidebar" id="sidebar" aria-label="Channels">
      <div id="sidebar-nav"></div>
      <div class="sidebar-footer">
        <button class="sidebar-add-btn" id="add-category">+ category</button>
        <button class="sidebar-add-btn" id="add-channel">+ channel</button>
      </div>
    </nav>

    <div class="chat" id="chat-area" role="region" aria-label="Chat">
      <div class="chat-header" style="padding:1rem 1.5rem;border-bottom:1px solid var(--border);flex-shrink:0;">
        <span class="chat-header-prefix" id="room-prefix">#</span>
        <span class="chat-header-name" id="room-name">general</span>
        <span class="chat-header-desc" id="room-desc"></span>
        <div class="search-bar" id="search-bar">
          <label for="search-input" class="sr-only">Search messages</label>
          <input type="search" id="search-input" placeholder="search messages..." autocomplete="off">
          <button class="search-close" id="search-close" aria-label="Close search">×</button>
        </div>
        <button class="search-btn" id="search-btn" aria-label="Search messages">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </button>
      </div>

      <div class="messages" id="messages" role="log" aria-live="polite" aria-label="Messages" tabindex="0"></div>

      <div class="typing-bar" aria-live="polite"><span class="typing-text" id="typing-indicator"></span></div>

      <div class="reply-bar" id="reply-bar" style="display:none" role="status" aria-live="polite">
        <span class="reply-bar-label" aria-hidden="true">↩</span>
        <span class="reply-bar-text" id="reply-bar-text"></span>
        <button class="reply-bar-cancel" id="reply-cancel" aria-label="Cancel reply">×</button>
      </div>

      <div class="drag-overlay" aria-hidden="true">drop image to send</div>

      <div class="chat-input-row">
        <div id="mention-picker" class="mention-picker" style="display:none" role="listbox" aria-label="Mention suggestions"></div>
        <label for="chat-input" class="sr-only">Message</label>
        <div class="chat-input-inner">
          <button class="upload-btn" id="upload-btn" disabled title="Upload image" aria-label="Upload image">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
          </button>
          <input type="file" id="file-input" accept="image/*" style="display:none" aria-hidden="true">
          <textarea id="chat-input" placeholder="say something..." autocomplete="off" disabled aria-label="Message" rows="1"></textarea>
          <span id="record-timer" style="display:none;font-size:0.8rem;color:#e57373;font-variant-numeric:tabular-nums;flex-shrink:0"></span>
          <button class="upload-btn" id="record-btn" disabled title="Voice memo" aria-label="Record voice memo">
            <svg id="record-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
          </button>
          <button id="send" disabled aria-label="Send message">send</button>
        </div>
      </div>
    </div>

    <aside class="members-panel" id="online-list" aria-label="Online members"></aside>
  </main>

  <!-- image lightbox -->
  <div class="img-lightbox" id="img-lightbox" role="dialog" aria-modal="true" aria-label="Image preview">
    <img id="img-lightbox-img" src="" alt="">
  </div>

  <!-- me modal -->
  <div class="modal-overlay" id="me-modal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="me-modal-heading">
    <div class="modal">
      <div class="modal-header">
        <h2 id="me-modal-heading">me</h2>
        <button class="modal-close" id="me-close" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <div class="avatar-row">
          <div class="avatar-drop-target" id="avatar-drop-target" title="Click or drop an image to upload" role="button" aria-label="Upload avatar image">
            <img class="modal-avatar-img" id="modal-avatar-img" alt="">
            <div class="modal-avatar-placeholder" id="modal-avatar-placeholder" aria-hidden="true"></div>
            <div class="avatar-drop-hint">drop or<br>click</div>
            <input type="file" id="avatar-file-input" accept="image/*" style="display:none" aria-hidden="true">
          </div>
          <div style="flex:1">
            <label for="modal-avatar">avatar url <span class="muted" style="font-size:var(--text-sm)">(optional)</span></label>
            <input type="url" id="modal-avatar" placeholder="https://..." autocomplete="off">
          </div>
        </div>

        <div class="field">
          <label for="modal-name">name</label>
          <input type="text" id="modal-name" autocomplete="off" placeholder="what do we call you?">
        </div>

        <div class="field">
          <div class="pubkey-label">your identity</div>
          <div class="pubkey-wrap">
            <div class="pubkey" id="modal-pubkey">—</div>
            <button class="copy-btn" id="modal-copy">copy</button>
          </div>
        </div>

        <div class="field" id="notify-field" style="display:none">
          <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer">
            <input type="checkbox" id="modal-notify" style="accent-color:var(--accent);width:14px;height:14px;cursor:pointer">
            <span>enable notifications</span>
          </label>
          <div id="notify-msg" style="font-size:var(--text-sm);color:var(--muted);margin-top:0.25rem"></div>
        </div>

        <div class="modal-actions">
          <button id="modal-save">save</button>
          <button class="ghost" id="modal-logout">log out</button>
        </div>
        <div class="modal-msg" id="modal-msg" role="status" aria-live="polite"></div>
      </div>
    </div>
  </div>

  <!-- invite modal -->
  <div class="modal-overlay" id="invite-modal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="invite-modal-heading">
    <div class="modal">
      <div class="modal-header">
        <h2 id="invite-modal-heading">invite</h2>
        <button class="modal-close" id="invite-close" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label for="invite-note">note (private — who is this?)</label>
          <textarea id="invite-note" rows="2" placeholder="Jesse, podcast co-host..." style="resize:vertical;min-height:3rem"></textarea>
        </div>
        <button class="invite-generate" id="invite-generate">generate invite link</button>
        <div class="invite-modal-msg" id="invite-modal-msg" role="status" aria-live="polite"></div>
        <div class="invite-list" id="invite-list"></div>
      </div>
    </div>
  </div>

  <div class="ctx-menu" id="ctx-menu" style="display:none" role="menu"></div>
  <div class="emoji-picker" id="emoji-picker" style="display:none" role="listbox" aria-label="Emoji suggestions"></div>

  <script type="module" src="/app.js"></script>

  <div id="voice-float" aria-label="Call participants"></div>

  <div id="voice-grid" role="dialog" aria-label="Video grid">
    <div id="vg-header">
      <span id="vg-ch"></span>
      <span id="vg-count" style="font-size:0.75rem;color:var(--muted);margin-right:auto"></span>
      <button class="vg-btn" id="vg-fs-btn" title="Fullscreen (F)"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
      <button class="vg-btn" id="vg-close-btn" title="Close"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
    </div>
    <div id="vg-tiles"></div>
  </div>

  <div id="voice-bar" style="display:none" role="complementary" aria-label="Voice channel">
    <div class="voice-bar-left">
      <span id="voice-bar-channel" class="voice-bar-channel"></span>
      <div id="voice-bar-members" class="voice-bar-avatars"></div>
    </div>
    <div class="voice-bar-controls">
      <button id="voice-grid-btn" class="ghost voice-ctrl-btn" aria-label="Video grid" title="Video grid">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M3 3h8v8H3V3zm10 0h8v8h-8V3zM3 13h8v8H3v-8zm10 0h8v8h-8v-8z"/></svg>
      </button>
      <button id="voice-cam-btn" class="ghost voice-ctrl-btn" aria-label="Toggle camera" title="Toggle camera">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/></svg>
      </button>
      <button id="voice-mute-btn" class="ghost voice-ctrl-btn" aria-label="Mute microphone">
        <svg id="voice-mute-icon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
      </button>
      <button id="voice-rec-btn" class="ghost voice-ctrl-btn" aria-label="Record session" title="Record session">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>
      </button>
      <button id="voice-leave-btn" class="ghost voice-ctrl-btn danger" aria-label="Leave voice">leave</button>
      <div id="voice-device-wrap" style="display:none; position:relative;">
        <button id="voice-device-btn" class="ghost voice-ctrl-btn" aria-label="Device settings" title="Device settings">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        </button>
        <div id="voice-device-menu" class="voice-device-menu" style="display:none"></div>
      </div>
    </div>
  </div>

</body>
</html>
